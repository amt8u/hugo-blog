<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Subtle grid lines -->
  <g stroke="#1e293b" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Bar chart (rising, representing SEO improvement) -->
  <g opacity="0.25">
    <rect x="120" y="480" width="60" height="80" rx="4" fill="#3b82f6"/>
    <rect x="210" y="430" width="60" height="130" rx="4" fill="#3b82f6"/>
    <rect x="300" y="370" width="60" height="190" rx="4" fill="#3b82f6"/>
    <rect x="390" y="300" width="60" height="260" rx="4" fill="#3b82f6"/>
    <rect x="480" y="230" width="60" height="330" rx="4" fill="#3b82f6"/>
  </g>

  <!-- Search bar graphic -->
  <rect x="200" y="155" width="800" height="70" rx="35" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <circle cx="248" cy="190" r="18" fill="none" stroke="#64748b" stroke-width="3"/>
  <line x1="261" y1="203" x2="275" y2="217" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
  <rect x="290" y="175" width="340" height="30" rx="4" fill="#334155"/>
  <rect x="645" y="175" width="120" height="30" rx="4" fill="#334155"/>
  <rect x="780" y="175" width="80" height="30" rx="4" fill="#334155"/>

  <!-- Tag labels floating -->
  <g font-family="monospace" font-size="22" fill="#38bdf8" opacity="0.7">
    <text x="200" y="290">&lt;meta&gt;</text>
    <text x="420" y="270">robots.txt</text>
    <text x="660" y="285">sitemap.xml</text>
    <text x="870" y="270">JSON-LD</text>
    <text x="300" y="490">og:image</text>
    <text x="560" y="510">hreflang</text>
    <text x="760" y="495">schema.org</text>
  </g>

  <!-- Upward trend arrow -->
  <polyline points="900,530 960,440 1020,380 1080,280" fill="none" stroke="#22c55e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <polygon points="1080,260 1065,295 1095,295" fill="#22c55e" opacity="0.8"/>

  <!-- Main title text -->
  <text x="600" y="385" font-family="system-ui, sans-serif" font-size="52" font-weight="bold" fill="#f1f5f9" text-anchor="middle">SEO Improvements</text>
  <text x="600" y="445" font-family="system-ui, sans-serif" font-size="28" fill="#94a3b8" text-anchor="middle">AI-assisted audit for a Hugo blog</text>

  <!-- Bottom label -->
  <text x="600" y="595" font-family="monospace" font-size="20" fill="#475569" text-anchor="middle">cybercafe.dev</text>
</svg>
